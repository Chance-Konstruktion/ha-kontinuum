enable_scenes:
  name: Licht-Szenen aktivieren
  description: Aktiviert automatische Licht-Szenen nach erkanntem Modus.

disable_scenes:
  name: Licht-Szenen deaktivieren
  description: Deaktiviert automatische Licht-Szenen.

set_scene:
  name: Szene konfigurieren
  description: Konfiguriert eine Licht-Szene für einen bestimmten Modus.
  fields:
    mode:
      name: Modus
      description: Der Modus (sleeping, relaxing, active, waking_up, cooking, away)
      required: true
      example: relaxing
      selector:
        select:
          options:
            - sleeping
            - relaxing
            - active
            - waking_up
            - cooking
            - away
    state:
      name: Zustand
      description: Licht-Zustand (on/off)
      required: false
      default: "on"
      example: "on"
      selector:
        select:
          options:
            - "on"
            - "off"
    brightness_pct:
      name: Helligkeit
      description: Helligkeit in Prozent (1-100)
      required: false
      example: 30
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    kelvin:
      name: Farbtemperatur
      description: Farbtemperatur in Kelvin (2000-6500)
      required: false
      example: 2700
      selector:
        number:
          min: 2000
          max: 6500
          unit_of_measurement: K

status:
  name: Status anzeigen
  description: Zeigt detaillierten KONTINUUM-Status als Notification.

export_brain:
  name: Brain exportieren
  description: >
    Exportiert die komprimierte brain.json.gz als lesbare brain_export.json
    nach /config/. Für externe Analyse mit DeepSeek oder anderen Tools.

activate:
  name: Semantik aktivieren
  description: >
    Schaltet autonome Ausführung für einen Gerätetyp frei.
    Schrittweise: Erst "light", dann "switch", etc.
    KONTINUUM steuert dann diese Geräte selbständig.
  fields:
    semantic:
      name: Gerätetyp
      description: Der zu aktivierende semantische Typ
      required: true
      example: light
      selector:
        select:
          options:
            - light
            - switch
            - fan
            - cover
            - climate
            - media
            - automation
            - vacuum

deactivate:
  name: Semantik deaktivieren
  description: >
    Deaktiviert autonome Ausführung für einen Gerätetyp.
    Mit semantic: "all" werden alle Typen deaktiviert.
  fields:
    semantic:
      name: Gerätetyp
      description: Der zu deaktivierende Typ (oder "all" für alle)
      required: true
      example: light
      selector:
        text:

configure_agent:
  name: Cortex Agent konfigurieren
  description: >
    Konfiguriert einen LLM-Agent für den KONTINUUM Cortex.
    Bis zu 4 Agents möglich (Slots 1-4). Slot 4 ist ideal für den Coordinator.
    Provider: ollama, openai, claude, gemini, grok.
  fields:
    slot:
      name: Slot
      description: Agent-Slot (1-4)
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 4
    name:
      name: Name
      description: Rolle des Agents (comfort, energy, safety, oder frei)
      required: true
      example: comfort
      selector:
        text:
    provider:
      name: Provider
      description: LLM-Provider
      required: true
      example: ollama
      selector:
        select:
          options:
            - ollama
            - openai
            - claude
            - gemini
            - grok
    model:
      name: Modell
      description: Modellname (z.B. llama3.2, gpt-4o-mini, claude-sonnet-4-20250514)
      required: false
      example: llama3.2
      selector:
        text:
    url:
      name: URL
      description: API-URL (bei Ollama z.B. http://192.168.1.100:11434)
      required: false
      example: "http://localhost:11434"
      selector:
        text:
    api_key:
      name: API Key
      description: API-Schlüssel (nur für Cloud-Provider)
      required: false
      selector:
        text:
    prompt:
      name: System-Prompt
      description: Eigener System-Prompt (leer = Standard-Prompt für die Rolle)
      required: false
      selector:
        text:
          multiline: true

cortex_consult:
  name: Cortex befragen
  description: >
    Löst manuell eine Beratung aller konfigurierten Cortex-Agents aus.
    Die Agents analysieren den aktuellen KONTINUUM-Zustand und geben
    Vorschläge als Notification aus.

remove_agent:
  name: Cortex Agent entfernen
  description: Entfernt einen Cortex-Agent aus einem Slot.
  fields:
    slot:
      name: Slot
      description: Agent-Slot zum Entfernen (1-4)
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 4

set_mode:
  name: Betriebsmodus setzen
  description: >
    Setzt den Betriebsmodus von KONTINUUM.
    Shadow = nur beobachten, Confirm = fragt vor jeder Aktion,
    Active = handelt selbstständig.
  fields:
    mode:
      name: Modus
      description: Betriebsmodus (shadow, confirm, active)
      required: true
      example: active
      selector:
        select:
          options:
            - shadow
            - confirm
            - active

confirm_action:
  name: Aktion bestätigen
  description: >
    Bestätigt eine wartende Aktion im Confirm-Modus.
    Entweder eine spezifische confirm_id oder confirm_all für alle wartenden.
  fields:
    confirm_id:
      name: Confirm ID
      description: ID der zu bestätigenden Aktion (z.B. c_1234567890_42)
      required: false
      example: "c_1234567890_42"
      selector:
        text:
    confirm_all:
      name: Alle bestätigen
      description: Alle wartenden Aktionen bestätigen
      required: false
      default: false
      selector:
        boolean:

reject_action:
  name: Aktion ablehnen
  description: >
    Lehnt eine wartende Aktion im Confirm-Modus ab und
    gibt negatives Feedback an das Lernsystem.
  fields:
    confirm_id:
      name: Confirm ID
      description: ID der abzulehnenden Aktion
      required: true
      example: "c_1234567890_42"
      selector:
        text:

cortex_sequential:
  name: Cortex Sequential Modus
  description: >
    Schaltet den Sequential-Modus des Cortex ein oder aus.
    Sequential = Agents werden nacheinander statt parallel befragt.
  fields:
    enabled:
      name: Aktiviert
      description: Sequential-Modus ein/aus
      required: true
      example: true
      selector:
        boolean:

brain_review:
  name: Brain Review
  description: >
    Startet einen vollständigen Brain Review durch den Cortex.
    Die LLM-Agents analysieren das gesamte Lernverhalten und geben
    Optimierungsvorschläge als Notification aus.
